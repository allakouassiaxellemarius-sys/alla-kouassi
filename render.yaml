services:
  - type: web
    name: competition-platform-api
    runtime: image
    repo: https://github.com/votre-username/competition-platform
    plan: free
    dockerfilePath: server/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: competition-platform-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

databases:
  - name: competition-platform-db
    plan: free
    databaseName: competition_platform
